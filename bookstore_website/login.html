<!doctype html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>เข้าสู่ระบบ | Lamoon Book
  </title>
  <link rel="stylesheet" href="assets/common.css" />
  <link rel="stylesheet" href="login.css" />
</head>

<body data-page="login">
  <section class="section auth-section">
    <div class="container auth-wrap">
      <section class="hero auth-hero">
        <h1>เข้าสู่ระบบ
        </h1>
        <h1> Lamoon Book</h1>
      </section>
      <section class="card auth-card">
        <h2>เข้าสู่ระบบ</h2>
        <form id="loginForm" class="grid">
          <div class="form-group"><label>อีเมล</label><input class="input" name="email" type="email"
              placeholder="กรอกอีเมลของคุณ" required></div>
          <div class="form-group"><label>รหัสผ่าน</label><input class="input" name="password" type="password"
              placeholder="กรอกรหัสผ่าน" required></div>
          <button class="btn btn-primary" type="submit">เข้าสู่ระบบ</button>
        </form>
        <p class="helper">ยังไม่มีบัญชี? <a href="register.html"
            style="color:var(--orange);font-weight:900">สมัครสมาชิก</a></p>
      </section>
    </div>
  </section>

  <script src="assets/common.js"></script>
  <script src="login.js"></script>
</body>

</html>

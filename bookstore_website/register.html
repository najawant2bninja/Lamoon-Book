<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>สมัครสมาชิก | WarmRead Store</title>
  <link rel="stylesheet" href="assets/common.css" />
  <link rel="stylesheet" href="register.css" />
</head>
<body data-page="login">
  <div id="appNav"></div>
  <main>
    <section class="section auth-section"><div class="container auth-wrap"><section class="hero auth-hero"><span class="eyebrow">Create Account</span><h1>สมัครสมาชิก</h1><p>สร้างบัญชีเพื่อสั่งซื้อและติดตามคำสั่งซื้อ</p></section><section class="card auth-card"><h2>สมัครบัญชีลูกค้า</h2><form id="registerForm" class="grid"><div class="form-group"><label>ชื่อผู้ใช้</label><input class="input" name="name" required></div><div class="form-group"><label>อีเมล</label><input class="input" name="email" type="email" required></div><div class="form-group"><label>เบอร์โทร</label><input class="input" name="phone" required></div><div class="form-group"><label>รหัสผ่าน</label><input class="input" name="password" type="password" minlength="6" required></div><button class="btn btn-primary" type="submit">สมัครสมาชิก</button></form><p class="helper">มีบัญชีแล้ว? <a href="login.html" style="color:var(--orange);font-weight:900">เข้าสู่ระบบ</a></p></section></div></section>
  </main>
  <div id="appFooter" class="footer"></div>
  <script src="assets/common.js"></script>
  <script src="register.js"></script>
</body>
</html>
